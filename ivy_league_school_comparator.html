  :root {

    --pink-strong: #D4537E;
    --pink-dark: #993556;

    --yellow-mid: #FAC775;
    --yellow-strong: #EF9F27;
    --yellow-dark: #BA7517;

  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans, sans-serif); }

  .page { padding: 1.5rem 1rem 3rem; max-width: 900px; margin: 0 auto; }

  .hero {
    text-align: center;

    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .flowers {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; opacity: 0.18;

    display: flex; flex-wrap: wrap; align-items: flex-start; justify-content: space-around;
    gap: 4px; padding: 4px;
  }
  .hero h1 { font-size: 22px; font-weight: 500; color: var(--pink-dark); position: relative; z-index: 1; }
  .hero p { font-size: 14px; color: #BA7517; margin-top: 6px; position: relative; z-index: 1; }

  .controls {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center;
  }
  .controls select, .controls input {
    border: 1.5px solid var(--pink-mid);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    background: #FFF5F9;
    color: var(--pink-dark);
    outline: none;
    cursor: pointer;
  }
  .controls select:focus, .controls input:focus { border-color: var(--pink-strong); }
  .filter-label { font-size: 13px; color: var(--pink-strong); font-weight: 500; }

  .tab-bar {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem;
  }
  .tab {
    padding: 7px 18px; border-radius: 20px; font-size: 13px; font-weight: 500;
    border: 1.5px solid var(--pink-mid); cursor: pointer;
    background: transparent; color: var(--pink-strong);
    transition: background 0.15s;
  }
  .tab.active {
    background: var(--pink-strong); color: #fff; border-color: var(--pink-strong);
  }
  .tab:hover:not(.active) { background: var(--pink-light); }

  .school-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  .school-card {
    background: #FFF8FB;
    border: 1.5px solid var(--pink-mid);
    border-radius: 16px;
    padding: 1rem 1.1rem 1.1rem;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
  }
  .school-card:hover { border-color: var(--pink-strong); transform: translateY(-2px); }
  .school-card.selected { border: 2px solid var(--pink-strong); background: #FFF0F7; }

  .school-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .school-icon {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 500; flex-shrink: 0;
  }
  .school-name { font-size: 15px; font-weight: 500; color: var(--pink-dark); }
  .school-loc { font-size: 12px; color: #BA7517; }

  .gpa-bar-wrap { margin: 8px 0 6px; }
  .gpa-label { font-size: 12px; color: #993556; margin-bottom: 3px; display: flex; justify-content: space-between; }
  .gpa-track {
    height: 8px; background: #F4C0D1; border-radius: 6px; overflow: hidden;
  }
  .gpa-fill {
    height: 100%; border-radius: 6px;
    background: linear-gradient(90deg, var(--yellow-mid), var(--pink-strong));
  }

  .tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .tag {
    font-size: 11px; padding: 3px 9px; border-radius: 10px;
    background: #FAEEDA; color: #854F0B; border: 1px solid #FAC775;
  }
  .tag.pink { background: #FBEAF0; color: #993556; border-color: var(--pink-mid); }

  .detail-panel {
    background: #FFF8FB;
    border: 1.5px solid var(--pink-mid);
    border-radius: 16px;
    padding: 1.25rem 1.25rem 1.5rem;
    margin-top: 1.5rem;
  }
  .detail-title { font-size: 18px; font-weight: 500; color: var(--pink-dark); margin-bottom: 4px; }
  .detail-sub { font-size: 13px; color: #BA7517; margin-bottom: 1rem; }

  .course-list { display: flex; flex-direction: column; gap: 10px; }
  .course-item {
    background: #FFF0F7;
    border: 1px solid var(--pink-mid);
    border-radius: 12px;
    padding: 10px 14px;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .course-icon {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; background: #FAEEDA; flex-shrink: 0;
  }
  .course-name { font-size: 14px; font-weight: 500; color: var(--pink-dark); }
  .course-desc { font-size: 12px; color: var(--color-text-secondary, #666); margin-top: 2px; }
  .course-gpa {
    margin-left: auto; font-size: 12px; font-weight: 500;
    background: #FAEEDA; color: #854F0B; padding: 3px 9px; border-radius: 10px;
    white-space: nowrap; align-self: center; flex-shrink: 0;
  }

  .stats-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; }
  .stat-box {
    background: #FFF0F7; border: 1px solid var(--pink-mid); border-radius: 10px;
    padding: 8px 14px; text-align: center; min-width: 90px;
  }
  .stat-val { font-size: 18px; font-weight: 500; color: var(--pink-dark); }
  .stat-key { font-size: 11px; color: #BA7517; margin-top: 1px; }

  .compare-btn {
    margin-top: 1rem;
    background: var(--pink-strong); color: #fff;
    border: none; border-radius: 20px; padding: 8px 22px;
    font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .compare-btn:hover { background: var(--pink-dark); }

  .compare-table-wrap { overflow-x: auto; margin-top: 1rem; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: var(--pink-light); color: var(--pink-dark); font-weight: 500;
    padding: 8px 10px; text-align: left; border-bottom: 1.5px solid var(--pink-mid);
  }
  td { padding: 7px 10px; border-bottom: 1px solid #F4C0D1; color: var(--color-text-primary, #222); }
  tr:nth-child(even) td { background: #FFF5F9; }
  tr:last-child td { border-bottom: none; }

  .close-btn {
    float: right; background: var(--pink-light); border: 1px solid var(--pink-mid);
    color: var(--pink-dark); border-radius: 12px; padding: 4px 12px;
    font-size: 12px; cursor: pointer;
  }
  .close-btn:hover { background: var(--pink-mid); color: #fff; }

  .empty { text-align: center; color: var(--pink-mid); font-size: 14px; padding: 2rem; }

  .section-title { font-size: 13px; font-weight: 500; color: var(--pink-strong); margin: 1rem 0 6px; text-transform: uppercase; letter-spacing: 0.05em; }
</style>

let selectedSchool = null;
let selectedIds = new Set();
let activeTab = "browse";

function switchTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('browseView').style.display = tab === 'browse' ? '' : 'none';
  document.getElementById('compareView').style.display = tab === 'compare' ? '' : 'none';
  if (tab === 'compare') renderCompare();
}

function gpaWidth(gpa) {
  return Math.round(((gpa - 3.5) / 0.5) * 100);
}

function getFieldEmoji(field) {
  const map = { STEM: '🔬', Humanities: '📚', Business: '📊', Law: '⚖️', Medicine: '🩺', 'Social Sciences': '🌐' };
  return map[field] || '📖';
}

function render() {
  const field = document.getElementById('fieldFilter').value;
  const search = document.getElementById('searchBox').value.toLowerCase();

  const filtered = schools.filter(s => {
    const matchSearch = s.name.toLowerCase().includes(search) || s.location.toLowerCase().includes(search);
    const matchField = !field || s.courses.some(c => c.field === field);
    return matchSearch && matchField;
  });

  const grid = document.getElementById('schoolGrid');
  grid.innerHTML = filtered.map(s => `
    <div class="school-card${selectedSchool === s.id ? ' selected' : ''}" onclick="showDetail('${s.id}')">
      <div class="school-header">
        <div class="school-icon" style="background:${s.bg};color:${s.color};font-size:13px;">${s.icon}</div>
        <div>
          <div class="school-name">${s.name}</div>
          <div class="school-loc">${s.location}</div>
        </div>
        <div style="margin-left:auto;">
          <input type="checkbox" title="Select for comparison" ${selectedIds.has(s.id) ? 'checked' : ''}
            onclick="event.stopPropagation(); toggleSelect('${s.id}', this)"
            style="width:16px;height:16px;accent-color:var(--pink-strong);cursor:pointer;" />
        </div>
      </div>
      <div class="gpa-bar-wrap">
        <div class="gpa-label">
          <span>Avg GPA cutoff</span>
          <span style="font-weight:500;">${s.gpa.toFixed(2)}</span>
        </div>
        <div class="gpa-track"><div class="gpa-fill" style="width:${gpaWidth(s.gpa)}%"></div></div>
      </div>
      <div style="font-size:12px;color:#993556;margin-top:4px;">Acceptance rate: <b>${s.acceptance}</b></div>
      <div class="tag-row">
        ${s.strengths.slice(0,3).map(str => `<span class="tag pink">${str}</span>`).join('')}
      </div>
    </div>
  `).join('') || '<div class="empty">No schools match your search.</div>';

  renderDetail();
}

function toggleSelect(id, el) {
  if (el.checked) selectedIds.add(id);
  else selectedIds.delete(id);
}

function showDetail(id) {
  selectedSchool = selectedSchool === id ? null : id;
  render();
}

function renderDetail() {
  const panel = document.getElementById('detailPanel');
  if (!selectedSchool) { panel.innerHTML = ''; return; }
  const s = schools.find(x => x.id === selectedSchool);
  if (!s) { panel.innerHTML = ''; return; }

  const field = document.getElementById('fieldFilter').value;
  const courses = field ? s.courses.filter(c => c.field === field) : s.courses;

  panel.innerHTML = `
    <div class="detail-panel">
      <button class="close-btn" onclick="selectedSchool=null;render()">✕ close</button>
      <div class="detail-title">${s.name}</div>
      <div class="detail-sub">${s.location} · Founded ${s.founded} · ${s.students} students</div>
      <p style="font-size:13px;color:var(--color-text-secondary,#666);margin-bottom:1rem;">${s.description}</p>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-val">${s.gpa.toFixed(2)}</div><div class="stat-key">GPA cutoff</div></div>
        <div class="stat-box"><div class="stat-val">${s.acceptance}</div><div class="stat-key">Acceptance</div></div>
        <div class="stat-box"><div class="stat-val">${s.founded}</div><div class="stat-key">Founded</div></div>
        <div class="stat-box"><div class="stat-val">${s.students}</div><div class="stat-key">Students</div></div>
      </div>
      <div class="section-title">Top courses ${field ? '· ' + field : ''}</div>
      <div class="course-list">
        ${courses.map(c => `
          <div class="course-item">
            <div class="course-icon">${getFieldEmoji(c.field)}</div>
            <div style="flex:1;min-width:0;">
              <div class="course-name">${c.name}</div>
              <div class="course-desc">${c.desc}</div>
              <div class="tag-row" style="margin-top:5px;"><span class="tag">${c.field}</span></div>
            </div>
            <div class="course-gpa">GPA ${c.gpa.toFixed(2)}+</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderCompare() {
  const panel = document.getElementById('compareContent');
  const selected = schools.filter(s => selectedIds.has(s.id));
  if (selected.length < 2) {
    panel.innerHTML = `<div class="empty" style="padding:3rem 1rem;">
      <div style="font-size:32px;margin-bottom:8px;">🌸</div>
      Select at least 2 schools using the checkboxes in the Browse tab to compare them here.
    </div>`;
    return;
  }
  const field = document.getElementById('fieldFilter').value;
  panel.innerHTML = `
    <div class="detail-title" style="margin-bottom:1rem;">Comparing ${selected.length} schools</div>
    <div class="compare-table-wrap">
      <table>
        <thead><tr>
          <th>Metric</th>
          ${selected.map(s => `<th style="color:${s.color}">${s.name.replace(' University','').replace(' College','')}</th>`).join('')}
        </tr></thead>
        <tbody>
          <tr><td>Location</td>${selected.map(s => `<td>${s.location}</td>`).join('')}</tr>
          <tr><td>Founded</td>${selected.map(s => `<td>${s.founded}</td>`).join('')}</tr>
          <tr><td>Students</td>${selected.map(s => `<td>${s.students}</td>`).join('')}</tr>
          <tr><td>Avg GPA cutoff</td>${selected.map(s => `<td><b>${s.gpa.toFixed(2)}</b></td>`).join('')}</tr>
          <tr><td>Acceptance rate</td>${selected.map(s => `<td>${s.acceptance}</td>`).join('')}</tr>
          <tr><td>Key strengths</td>${selected.map(s => `<td>${s.strengths.slice(0,3).join(', ')}</td>`).join('')}</tr>
        </tbody>
      </table>
    </div>
    <div class="section-title" style="margin-top:1.5rem;">GPA bar comparison</div>
    ${selected.map(s => `
      <div style="margin-bottom:8px;">
        <div class="gpa-label" style="font-size:13px;">
          <span style="color:${s.color};font-weight:500;">${s.name.replace(' University','').replace(' College','')}</span>
          <span>${s.gpa.toFixed(2)}</span>
        </div>
        <div class="gpa-track" style="height:12px;"><div class="gpa-fill" style="width:${gpaWidth(s.gpa)}%"></div></div>
      </div>
    `).join('')}
    <div class="section-title" style="margin-top:1.5rem;">Top courses${field ? ' · ' + field : ''}</div>
    ${selected.map(s => {
      const courses = field ? s.courses.filter(c => c.field === field) : s.courses;
      return `
        <div style="margin-bottom:1.25rem;">
          <div style="font-size:14px;font-weight:500;color:${s.color};margin-bottom:6px;">${s.name}</div>
          <div class="course-list">
            ${courses.map(c => `
              <div class="course-item">
                <div class="course-icon">${getFieldEmoji(c.field)}</div>
                <div style="flex:1;min-width:0;">
                  <div class="course-name">${c.name}</div>
                  <div class="course-desc">${c.desc}</div>
                </div>
                <div class="course-gpa">GPA ${c.gpa.toFixed(2)}+</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }).join('')}
  `;
}

render();
</script>
